version: 1

check:
  fail_on: block
  policy: false
  exclude:
    - ".git/**"
    - ".DS_Store"
    - "Derived/**"
    - "Tuist/.build/**"
    - "Tuist/Dependencies/**"
    - "*.xcodeproj/**"
    - "*.xcworkspace/**"
    - "build/**"
    - "*.xcarchive/**"
    - "*.dmg"
    - "xcuserdata/**"
    - "*.xcuserstate"
    - "*.moved-aside"
    - "*.mobileprovision"
    - "*.provisionprofile"
    - "**/Secrets.xcconfig"
    - ".env"
    - "App/Resources/en.lproj/Localizable.strings"
    - "Core/DetectionCore/Sources/DetectionEngine.swift"
    - "Core/DetectionCore/Tests/**"
    - "Core/OffsendRuntime/Tests/**"
    - "Core/MaskingCore/Tests/**"
    - "Core/AIDetectionCore/Tests/**"
    - "Services/WorkspaceWatchService/Tests/**"
    - "Scripts/ci_cli_e2e.sh"
    - "docs/**"
  detectors:
    disable:
      - email
      - phone
      - money
      - url
      - ipAddress
      - internalDomain
      - contractId
      - invoiceId
      - orderId
      - creditCardLike
      - iban
      - personName
      - streetAddress
      - governmentId

hooks:
  type: pre-commit
  fail_on: block
  policy: false
