version: 1

check:
  fail_on: block
  policy: false
  # Generated by: offsend init --template swift,tuist
  # templates: common, swift, tuist
  exclude:
    - "*.lock"
    - ".DS_Store"
    - "Thumbs.db"
    - "Desktop.ini"
    - "**/dist/**"
    - "**/build/**"
    - "**/coverage/**"
    - "*.map"
    - "*.min.js"
    - "*.min.css"
    - ".eslintcache"
    - ".stylelintcache"
    - ".offsend/hooks/**"
    # Binary / non-text assets — offsend check cannot scan them and exits 2 on skips.
    - "**/*.png"
    - "**/*.gif"
    - "**/*.jpg"
    - "**/*.jpeg"
    - "**/*.ico"
    - "**/*.webp"
    - "**/*.icns"
    - "**/DerivedData/**"
    - "**/.build/**"
    - "**/Pods/**"
    - "**/Carthage/Build/**"
    - "**/xcuserdata/**"
    - "*.xcuserstate"
    - "*.xcarchive/**"
    - "Package.resolved"
    - "*.ipa"
    - "**/*.dSYM/**"
    - "**/Derived/**"
    - "**/Tuist/.build/**"
    - "**/Tuist/Dependencies/**"
    - "**/.tuist-bin/**"
    - "**/.tuist-generated"
    - ".package.resolved"
    - "docs/**"
    - "assets/**"
    # Sparkle public EdDSA key (SUPublicEDKey) is meant to be public; highEntropyString FP.
    - "App/Resources/Info.plist"
    - "App/Resources/en.lproj/Localizable.strings"
    - "Core/DetectionCore/Sources/DetectionEngine.swift"
    - "Core/DetectionCore/Tests/**"
    - "Core/OffsendRuntime/Tests/**"
    - "Core/MaskingCore/Tests/**"
    - "Core/AIDetectionCore/Tests/**"
    - "Services/WorkspaceWatchService/Tests/**"
    - "Scripts/ci_cli_e2e.sh"
    # Optional — uncomment only if these dirs never hold secrets:
    # - "**/.cache/**"
    # - "**/tmp/**"
    # - "**/temp/**"
  detectors:
    # All detector IDs you can list under `disable:`:
    #   email, phone, money, url, ipAddress, internalDomain, contractId,
    #   invoiceId, orderId, apiKeyGeneric, openAIAPIKey, awsAccessKeyId,
    #   githubToken, slackToken, stripeKey, jwt, privateKey, sshPrivateKey,
    #   databaseURLWithPassword, bearerToken, highEntropyString, creditCardLike,
    #   iban, customClient, customCompany, customProject, customSensitiveTerm,
    #   customInternalDomain, personName, streetAddress, governmentId
    # Default keeps only secret/credential detectors active.
    disable:
      - email
      - phone
      - money
      - url
      - ipAddress
      - internalDomain
      - contractId
      - invoiceId
      - orderId
      - creditCardLike
      - iban
      - personName
      - streetAddress
      - governmentId
  # Custom dictionaries are matched in addition to the built-in detectors.
  # kind: client | company | project | sensitiveTerm | internalDomain | regex
  # For every kind except `regex`, `value` is matched literally (with word boundaries).
  # For `regex`, `value` is used as a regular expression pattern verbatim.
  dictionaries: []

ignore:
  commit: false
  patterns:
    - ".env*"
    - "*.pem"
    - "*.key"
    - ".ssh/"
    - "id_rsa"
    - "id_ed25519"
    - "id_ecdsa"
    - "*.ppk"
    - ".aws/"
    - ".azure/"
    - ".kube/"
    - ".docker/"
    - ".cargo/credentials*"
    - ".fly/"
    - "credentials.json"
    - "secrets.json"
    - "auth.json"
    - "service-account*.json"
    - "gcp-credentials*.json"
    - "azureauth.json"
    - "kubeconfig"
    - "*.kubeconfig"
    - "*.tfstate"
    - "*.tfstate.*"
    - "*.tfvars"
    - "*.p12"
    - "*.pfx"
    - "*.gpg"
    - ".netrc"
    - ".npmrc"
    - ".pypirc"
    - ".htpasswd"
    - ".dockerconfigjson"
    - "serviceAccountKey.json"
    - "firebase-adminsdk-*.json"
    - "google-services.json"
    - "GoogleService-Info.plist"
    - "local.properties"
    - "Secrets.xcconfig"
    - "application-local.*"
    - "accessKeys.csv"
    - "credentials.csv"
    - "*.ovpn"
    - "*.rdp"
    - "*.kdbx"
    - ".git-credentials"
    - ".pgpass"
    - ".my.cnf"
    - ".yarnrc.yml"
    - ".terraformrc"
    - "terraform.rc"
    - "*.p8"
    - "*.keystore"
    - "*.jks"
    - "*.mobileprovision"
    - "*.sqlite"
    - "*.sqlite3"
    - "*.log"
    - "logs/"
    - "dumps/"
    - "exports/"
    - "*.bak"
    - "*.backup"
    - ".bash_history"
    - ".zsh_history"
    - ".psql_history"
    - ".mysql_history"
    - ".python_history"
    - "agent-transcripts/"
    - "**/agent-transcripts/**"
    - "*.sql.gz"
    - "*.dump"

hooks:
  type: pre-commit
  fail_on: block
  policy: false
  publish: false
