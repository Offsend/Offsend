name: Release

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Marketing version (CFBundleShortVersionString, e.g. 0.0.6)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-cli:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        env:
          SWIFT_VERSION: "6.0.3"
        run: bash Scripts/install_swift_linux_ci.sh

      - name: Install git
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends git

      - name: Build Linux CLI
        env:
          OFFSEND_CLI_VERSION: ${{ github.event.inputs.marketing_version }}
        run: bash Scripts/build_linux_cli.sh

      - name: Package Linux CLI
        env:
          VERSION: ${{ github.event.inputs.marketing_version }}
          ARCH: ${{ matrix.arch }}
        run: bash Scripts/package_linux_cli.sh "$VERSION" "$ARCH"

      - name: Upload Linux CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: offsend-cli-linux-${{ matrix.arch }}
          path: build/offsend-cli-${{ github.event.inputs.marketing_version }}-linux-${{ matrix.arch }}.tar.gz

  build-notarize:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tuist
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install dependencies
        run: tuist install

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_APPLICATION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_APPLICATION_CERTIFICATE_P12_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${P12_BASE64:-}" || { echo "Missing secret MACOS_APPLICATION_CERTIFICATE_P12"; exit 1; }
          test -n "${P12_PASSWORD:-}" || { echo "Missing secret MACOS_APPLICATION_CERTIFICATE_P12_PASSWORD"; exit 1; }

          KEYCHAIN_PASSWORD="github-actions-signing"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Generate Xcode project
        run: tuist generate

      - name: Archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID }}
          TELEMETRYDECK_APP_ID: ${{ secrets.TELEMETRYDECK_APP_ID }}
          MARKETING_VERSION: ${{ github.event.inputs.marketing_version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          test -n "${TELEMETRYDECK_APP_ID:-}" || { echo "Missing repository secret TELEMETRYDECK_APP_ID (TelemetryDeck App ID from dashboard)"; exit 1; }
          test -n "${MARKETING_VERSION:-}" || { echo "Missing workflow input marketing_version"; exit 1; }
          echo "Building marketing version=$MARKETING_VERSION build=$BUILD_NUMBER"
          # `-configuration Release`: internal UI is behind `#if DEBUG` and is not compiled into shipping builds.
          # Do not pass CODE_SIGN_IDENTITY: it applies to SwiftPM targets and conflicts with automatic signing.
          xcodebuild \
            -workspace Offsend.xcworkspace \
            -scheme Offsend \
            -configuration Release \
            -destination "platform=macOS" \
            -archivePath "build/Offsend.xcarchive" \
            -derivedDataPath "build/DerivedData" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            TELEMETRYDECK_APP_ID="$TELEMETRYDECK_APP_ID" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            clean archive

      - name: Write ExportOptions.plist (Developer ID)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "${TEAM_ID:-}" || { echo "Missing secret: set repository secret APPLE_TEAM_ID (or TEAM_ID) to your Apple Developer Team ID"; exit 1; }
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          PLIST
          sed -i '' 's/^[[:space:]]*//' "$RUNNER_TEMP/ExportOptions.plist"

      - name: Export signed .app (re-signs Sparkle)
        run: |
          set -euo pipefail
          rm -rf "build/export"
          # exportArchive re-signs the app + Sparkle's XPC services/Updater.app with Developer ID +
          # secure timestamps and strips get-task-allow. The CLI is added afterwards (next step):
          # it is not in the archive, and exportArchive re-signs foreign helpers without the hardened
          # runtime, which fails notarization.
          xcodebuild \
            -exportArchive \
            -archivePath "build/Offsend.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          codesign --verify --deep --strict --verbose=2 "build/export/Offsend.app"

      - name: Embed + sign CLI in exported app
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "${TEAM_ID:-}" || { echo "Missing secret: set repository secret APPLE_TEAM_ID (or TEAM_ID) to your Apple Developer Team ID"; exit 1; }
          bash Scripts/embed_cli_in_app.sh \
            "build/export/Offsend.app" \
            "build/DerivedData" \
            "$TEAM_ID" \
            "App/Resources/Offsend.entitlements"

      - name: Verify embedded CLI in app bundle
        run: |
          set -euo pipefail
          CLI="build/export/Offsend.app/Contents/Helpers/offsend"
          test -x "$CLI"
          codesign --verify --strict --verbose=2 "$CLI"
          codesign -d --verbose=4 "$CLI" 2>&1 | grep -q "flags=.*runtime" || { echo "CLI missing hardened runtime"; exit 1; }
          echo "Embedded CLI OK (hardened runtime present): $CLI"

      - name: Package CLI for Homebrew
        env:
          VERSION: ${{ github.event.inputs.marketing_version }}
        run: |
          set -euo pipefail
          bash Scripts/package_cli.sh \
            "build/export/Offsend.app" \
            "build/offsend-cli-${VERSION}.zip"

      - name: Notarize CLI zip (notarytool)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          ARTIFACT_PATH: build/offsend-cli-${{ github.event.inputs.marketing_version }}.zip
        run: bash Scripts/notarize.sh

      - name: Read app version from exported bundle
        id: app_version
        run: |
          set -euo pipefail
          PLIST="build/export/Offsend.app/Contents/Info.plist"
          test -f "$PLIST"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")"
          TELEMETRY_ID="$(/usr/libexec/PlistBuddy -c 'Print :TelemetryDeckAppID' "$PLIST" 2>/dev/null || true)"
          test -n "${TELEMETRY_ID:-}" || { echo "TelemetryDeckAppID is missing or empty in exported Info.plist"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Marketing version=$VERSION build=$BUILD"
          echo "TelemetryDeck configured (App ID length: ${#TELEMETRY_ID})"

      - name: Create DMG
        env:
          APP_PATH: build/export/Offsend.app
          DMG_PATH: build/Offsend-${{ steps.app_version.outputs.version }}.dmg
        run: bash Scripts/build_dmg.sh

      - name: Notarize DMG (notarytool)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          DMG_PATH: build/Offsend-${{ steps.app_version.outputs.version }}.dmg
        run: bash Scripts/notarize.sh

      - name: Install Sparkle CLI (generate_appcast)
        run: |
          set -euo pipefail
          SPARKLE_VERSION="2.7.1"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle" --strip-components 1
          test -x "$RUNNER_TEMP/sparkle/bin/generate_appcast"
          echo "GENERATE_APPCAST=$RUNNER_TEMP/sparkle/bin/generate_appcast" >> "$GITHUB_ENV"

      - name: Sparkle — generate appcast.xml
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          test -n "${SPARKLE_EDDSA_PRIVATE_KEY:-}" || { echo "Missing repository secret SPARKLE_EDDSA_PRIVATE_KEY (required for generate_appcast)."; exit 1; }
          ARCHIVE_DIR="$RUNNER_TEMP/sparkle_archives"
          mkdir -p "$ARCHIVE_DIR"
          REPO="${{ github.repository }}"
          PREV="$ARCHIVE_DIR/appcast-prev.xml"
          rm -f "$PREV"
          if curl -fsSL --fail --retry 2 -o "$PREV" "https://github.com/${REPO}/releases/latest/download/appcast.xml" && [[ -s "$PREV" ]]; then
            mv "$PREV" "$ARCHIVE_DIR/appcast.xml"
            echo "Using existing appcast from latest GitHub Release for merge"
          elif [[ -f appcast/appcast.xml ]]; then
            cp appcast/appcast.xml "$ARCHIVE_DIR/appcast.xml"
            echo "Using appcast/appcast.xml from checkout (bootstrap)"
          fi
          DMG_NAME="Offsend-${VERSION}.dmg"
          cp "build/${DMG_NAME}" "$ARCHIVE_DIR/"
          DOWNLOAD_PREFIX="https://github.com/${REPO}/releases/download/v${VERSION}/"
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_PREFIX" \
            --maximum-deltas 0 \
            --maximum-versions 0 \
            "$ARCHIVE_DIR"
          mkdir -p appcast
          cp "$ARCHIVE_DIR/appcast.xml" appcast/appcast.xml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Offsend-${{ steps.app_version.outputs.version }}-${{ steps.app_version.outputs.build }}
          path: |
            build/Offsend-${{ steps.app_version.outputs.version }}.dmg
            build/export/Offsend.app
            build/offsend-cli-${{ steps.app_version.outputs.version }}.zip
            appcast/appcast.xml

      - name: Push version tag
        env:
          VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"

      - name: Create or update GitHub Release (DMG + appcast)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          DMG="build/Offsend-${VERSION}.dmg"
          CLI_ZIP="build/offsend-cli-${VERSION}.zip"
          APPCAST="appcast/appcast.xml"
          test -f "$APPCAST"
          test -f "$CLI_ZIP"
          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" "$CLI_ZIP" "$APPCAST" --repo "$REPO" --clobber
          else
            gh release create "$TAG" "$DMG" "$CLI_ZIP" "$APPCAST" \
              --repo "$REPO" \
              --title "Offsend ${VERSION}" \
              --generate-notes \
              --latest
          fi

      - name: Download Linux CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: offsend-cli-linux-*
          path: build/linux-cli
          merge-multiple: true

      - name: Upload Linux CLI to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          REPO="${{ github.repository }}"
          shopt -s nullglob
          assets=(build/linux-cli/offsend-cli-"${VERSION}"-linux-*.tar.gz)
          test "${#assets[@]}" -gt 0
          gh release upload "$TAG" "${assets[@]}" --repo "$REPO" --clobber

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          bash Scripts/update_homebrew_tap.sh \
            "$VERSION" \
            "build/Offsend-${VERSION}.dmg" \
            "build/offsend-cli-${VERSION}.zip" \
            "build/linux-cli/offsend-cli-${VERSION}-linux-x86_64.tar.gz" \
            "build/linux-cli/offsend-cli-${VERSION}-linux-aarch64.tar.gz"

      - name: Update ai-hygiene GitHub Action
        env:
          AI_HYGIENE_TOKEN: ${{ secrets.AI_HYGIENE_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          bash Scripts/update_ai_hygiene_action.sh \
            "$VERSION" \
            "build/offsend-cli-${VERSION}.zip" \
            "build/linux-cli/offsend-cli-${VERSION}-linux-x86_64.tar.gz" \
            "build/linux-cli/offsend-cli-${VERSION}-linux-aarch64.tar.gz"

      - name: Rebuild website
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
          APP_ID: ${{ secrets.DIGITALOCEAN_APP_ID }}
        run: |
          set -euo pipefail
          test -n "${DIGITALOCEAN_TOKEN:-}" || { echo "Missing repository secret DIGITALOCEAN_TOKEN"; exit 1; }
          test -n "${APP_ID:-}" || { echo "Missing repository secret DIGITALOCEAN_APP_ID"; exit 1; }
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DIGITALOCEAN_TOKEN" \
            -d '{"force_build": true}' \
            "https://api.digitalocean.com/v2/apps/$APP_ID/deployments"
