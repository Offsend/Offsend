name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-notarize:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tuist and create-dmg
        run: brew install tuist create-dmg

      - name: Install dependencies
        run: tuist install

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_APPLICATION_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_APPLICATION_CERTIFICATE_P12_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${P12_BASE64:-}" || { echo "Missing secret MACOS_APPLICATION_CERTIFICATE_P12"; exit 1; }
          test -n "${P12_PASSWORD:-}" || { echo "Missing secret MACOS_APPLICATION_CERTIFICATE_P12_PASSWORD"; exit 1; }

          KEYCHAIN_PASSWORD="github-actions-signing"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Generate Xcode project
        run: tuist generate

      - name: Write ExportOptions.plist (Developer ID)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "${TEAM_ID:-}" || { echo "Missing secret: set repository secret APPLE_TEAM_ID (or TEAM_ID) to your Apple Developer Team ID"; exit 1; }
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          PLIST
          sed -i '' 's/^[[:space:]]*//' "$RUNNER_TEMP/ExportOptions.plist"

      - name: Archive
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID }}
        run: |
          set -euo pipefail
          # `-configuration Release`: internal UI is behind `#if DEBUG` and is not compiled into shipping builds.
          # Do not pass CODE_SIGN_IDENTITY: it applies to SwiftPM targets and conflicts with automatic signing.
          xcodebuild \
            -workspace Offsend.xcworkspace \
            -scheme Offsend \
            -configuration Release \
            -destination "platform=macOS" \
            -archivePath "build/Offsend.xcarchive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            clean archive

      - name: Export signed .app
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "build/Offsend.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Read app version from exported bundle
        id: app_version
        run: |
          set -euo pipefail
          PLIST="build/export/Offsend.app/Contents/Info.plist"
          test -f "$PLIST"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Marketing version=$VERSION build=$BUILD"

      - name: Create DMG
        env:
          APP_PATH: build/export/Offsend.app
          DMG_PATH: build/Offsend-${{ steps.app_version.outputs.version }}.dmg
        run: bash Scripts/build_dmg.sh

      - name: Notarize DMG (notarytool)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || secrets.TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          DMG_PATH: build/Offsend-${{ steps.app_version.outputs.version }}.dmg
        run: bash Scripts/notarize.sh

      - name: Install Sparkle CLI (generate_appcast)
        run: |
          set -euo pipefail
          SPARKLE_VERSION="2.9.1"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle" --strip-components 1
          test -x "$RUNNER_TEMP/sparkle/bin/generate_appcast"
          echo "GENERATE_APPCAST=$RUNNER_TEMP/sparkle/bin/generate_appcast" >> "$GITHUB_ENV"

      - name: Sparkle — generate appcast.xml
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          test -n "${SPARKLE_EDDSA_PRIVATE_KEY:-}" || { echo "Missing repository secret SPARKLE_EDDSA_PRIVATE_KEY (required for generate_appcast)."; exit 1; }
          ARCHIVE_DIR="$RUNNER_TEMP/sparkle_archives"
          mkdir -p "$ARCHIVE_DIR"
          REPO="${{ github.repository }}"
          PREV="$ARCHIVE_DIR/appcast-prev.xml"
          rm -f "$PREV"
          if curl -fsSL --fail --retry 2 -o "$PREV" "https://github.com/${REPO}/releases/latest/download/appcast.xml" && [[ -s "$PREV" ]]; then
            mv "$PREV" "$ARCHIVE_DIR/appcast.xml"
            echo "Using existing appcast from latest GitHub Release for merge"
          elif [[ -f appcast/appcast.xml ]]; then
            cp appcast/appcast.xml "$ARCHIVE_DIR/appcast.xml"
            echo "Using appcast/appcast.xml from checkout (bootstrap)"
          fi
          DMG_NAME="Offsend-${VERSION}.dmg"
          cp "build/${DMG_NAME}" "$ARCHIVE_DIR/"
          DOWNLOAD_PREFIX="https://github.com/${REPO}/releases/download/v${VERSION}/"
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_PREFIX" \
            --maximum-deltas 0 \
            --maximum-versions 0 \
            "$ARCHIVE_DIR"
          mkdir -p appcast
          cp "$ARCHIVE_DIR/appcast.xml" appcast/appcast.xml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Offsend-${{ steps.app_version.outputs.version }}-${{ steps.app_version.outputs.build }}
          path: |
            build/Offsend-${{ steps.app_version.outputs.version }}.dmg
            build/export/Offsend.app
            appcast/appcast.xml

      - name: Push version tag
        env:
          VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "refs/tags/$TAG"

      - name: Create or update GitHub Release (DMG + appcast)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.app_version.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          DMG="build/Offsend-${VERSION}.dmg"
          APPCAST="appcast/appcast.xml"
          test -f "$APPCAST"
          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" "$APPCAST" --repo "$REPO" --clobber
          else
            gh release create "$TAG" "$DMG" "$APPCAST" \
              --repo "$REPO" \
              --title "Offsend ${VERSION}" \
              --generate-notes \
              --latest
          fi

      - name: Rebuild website
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
          APP_ID: ${{ secrets.DIGITALOCEAN_APP_ID }}
        run: |
          set -euo pipefail
          test -n "${DIGITALOCEAN_TOKEN:-}" || { echo "Missing repository secret DIGITALOCEAN_TOKEN"; exit 1; }
          test -n "${APP_ID:-}" || { echo "Missing repository secret DIGITALOCEAN_APP_ID"; exit 1; }
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DIGITALOCEAN_TOKEN" \
            -d '{"force_build": true}' \
            "https://api.digitalocean.com/v2/apps/$APP_ID/deployments"
