name: Deploy Scan API

on:
  push:
    branches: [main]
    paths:
      - "Server/**"
      - "Core/WorkspacePolicyCore/**"
      - "Core/OffsendRuntime/Sources/ReportReporter.swift"
      - ".github/workflows/deploy-scan-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-scan-api
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - name: Install git
        run: sudo apt-get update && sudo apt-get install -y git
      - name: Sync shared scan sources
        run: bash Scripts/sync_scan_vendor.sh
      - name: Test
        working-directory: Server
        run: swift test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: bash Scripts/deploy_scan_api.sh
