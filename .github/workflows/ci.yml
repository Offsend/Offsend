name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install Tuist
        run: brew install tuist
      - name: Install dependencies
        run: tuist install
      - name: Run tests
        run: tuist test
      - name: Build OffsendCLI
        run: |
          xcodebuild \
            -workspace Offsend.xcworkspace \
            -scheme OffsendCLI \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath build/DerivedData \
            build
      - name: Run CLI E2E smoke
        run: bash Scripts/ci_cli_e2e.sh build/DerivedData/Build/Products/Debug/offsend
