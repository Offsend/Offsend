name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install Tuist
        uses: jdx/mise-action@v2
        with:
          install: true
      - name: Install dependencies
        run: tuist install
      - name: Run tests
        run: tuist test
      - name: Build OffsendCLI
        run: |
          xcodebuild \
            -workspace Offsend.xcworkspace \
            -scheme OffsendCLI \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath build/DerivedData \
            build
      - name: Run CLI E2E smoke
        run: bash Scripts/ci_cli_e2e.sh build/DerivedData/Build/Products/Debug/offsend

  linux-cli:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-24.04-arm64
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0.3"
      - name: Build offsend CLI
        run: swift build --product offsend -c release
      - name: Run SPM tests
        run: swift test
      - name: Run CLI E2E smoke
        run: bash Scripts/ci_cli_e2e.sh .build/release/offsend

      - name: Verify CLI Docker image builds
        run: docker build -f CLI/Dockerfile -t offsend-cli:ci .

      - name: Docker smoke test
        run: |
          docker run --rm offsend-cli:ci --version
          docker run --rm offsend-cli:ci check --help
