name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install Tuist
        run: brew install tuist
      - name: Install dependencies
        run: tuist install
      - name: Run tests
        run: tuist test
